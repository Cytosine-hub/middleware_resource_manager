# ============================================================================
# 集成中心门户 · monorepo 微服务 CI/CD
#
# 设计：每个服务一条独立流水线，按【路径触发】——只有相关目录变更才构建对应服务；
#       改动共享库 common-* 或父 POM 则【扇出】重建所有服务（每个服务的 changes 里都含这几条）。
# 构建期服务之间零依赖：只用 `mvn -pl <服务> -am`（also-make，连带构建 common-* 与其能力模块）。
# 服务间真实联通（网关↔Nacos↔服务、认证越权）属【集成】层，单独一条流水线在预发环境跑。
#
# 需要：Runner Job 可访问 Runner 主机的 Docker Socket（见 runner/config.md）。
#       编译、镜像构建和 Docker Compose 部署均在同一台 Runner 主机完成，不推送 JAR 或镜像制品。
# ============================================================================

# 只在【后端代码 / CI 文件】改动时创建流水线（MR / push / tag）。
# 纯文档改动（agent.md、docs、README 等）没有可跑的 job → 不创建流水线，
# 避免 GitLab 把"空流水线"判为 failed（doc-only 合并不再爆红叉）。
workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["backend/**/*", ".gitlab-ci.yml"]
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: ["backend/**/*", ".gitlab-ci.yml"]

default:
  image:
    name: docker:27-cli
    pull_policy: if-not-present       # 仅本地不存在时拉取镜像
  tags: [TLZJJ]                          # 项目 Runner 标签

variables:
  DOCKER_BUILDKIT: "1"
  IMAGE_NAMESPACE: "infra-portal"

stages:
  - verify        # 编译 + 单元测试 + 打包（每服务独立）
  - integration   # 端到端 / 认证越权（需 Nacos + 多服务，骨架，手动）
  - deploy        # 部署（每服务独立，骨架，手动）

# 服务构建模板：Docker 多阶段构建中执行 mvn -pl <SVC> -am clean verify，
# 然后将可执行 JAR 封装为 Runner 主机镜像。镜像只保留在 Runner 主机的 Docker 守护进程中。
.svc-verify:
  stage: verify
  script:
    - export IMAGE_NAME="$IMAGE_NAMESPACE/$SVC"
    - docker build --build-arg SERVICE="$SVC" --tag "$IMAGE_NAME:$CI_COMMIT_SHA" --tag "$IMAGE_NAME:latest" --file deploy/Dockerfile .
    - echo "== Runner 主机构建镜像：$IMAGE_NAME:$CI_COMMIT_SHA =="
    - docker image inspect "$IMAGE_NAME:$CI_COMMIT_SHA" --format 'ID={{.Id}}\n创建时间={{.Created}}\n大小={{.Size}} bytes'

# ----------------------------------------------------------------------------
# 每服务流水线（路径触发）。
# 每个 changes 列表 = 该服务自身 + 其能力模块 + 【扇出段】(共享库/父POM/本文件)。
# 改共享库 → 所有服务的扇出段命中 → 全部重建。
# ----------------------------------------------------------------------------
verify:api-gateway:
  extends: .svc-verify
  variables: { SVC: api-gateway }
  rules:
    - changes:
        - backend/api-gateway/**/*
        - backend/pom.xml
        - backend/modular-monolith-parent/pom.xml
        - backend/common-core/**/*
        - backend/common-security/**/*
        - backend/common-web/**/*
        - .gitlab-ci.yml

