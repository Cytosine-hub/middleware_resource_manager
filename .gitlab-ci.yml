# ----------------------------------------------------------------------------
# 集成流水线（骨架）：起 Nacos + 各服务，跑认证越权与联通验证。
# 需要 docker-in-docker 或预发环境；这里给出结构与验证清单，按你们环境补全。
# 手动触发，避免每次 push 都跑重活。
# ----------------------------------------------------------------------------
integration:e2e:
  stage: integration
  allow_failure: true          # 骨架阶段先不阻断；补全后改 false
  # services:                  # ← 取消注释并配好后启用
  #   - name: nacos/nacos-server:v2.3.2
  #     alias: nacos
  #   - name: mysql:8
  #     alias: mysql
  variables:
    GATEWAY_SIGNING_SECRET: "ci-integration-signing-secret-at-least-32-bytes"
  script:
    - echo "== 集成验证骨架（按 docs 阶段5 安全清单补全）=="
    - echo "1) 起 Nacos + MySQL + 各服务 fat jar（cloud profile，注入 GATEWAY_SIGNING_SECRET）"
    - echo "2) 经网关带有效 token 访问受保护端点 -> 期望 200"
    - echo "3) 越权A：直连下游带伪造 X-Roles 但无签名 -> 期望 401/403"
    - echo "4) 越权B：客户端经网关塞伪造 X-User -> 网关剥除后按 token 重注入"
    - echo "5) 越权C：直连 introspect 不带 X-Gateway-Sign -> 期望 403"
    - echo "6) 过期 token / 退出后同 token -> 期望 401"
    - echo "TODO 用 docker compose 起服务并用 curl 断言以上各条"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_REF_NAME == "master"'
      when: manual
      allow_failure: true

# ----------------------------------------------------------------------------
# 部署（骨架）：每服务独立部署，互不依赖。改 core 不用重部 ai。
# 手动触发；把 script 换成你们的部署方式（scp jar + systemd / k8s / 镜像推送）。
# 注意共享运行时契约（introspect 接口 / GATEWAY_SIGNING_SECRET / Nacos 配置）需协调，别乱改。
# ----------------------------------------------------------------------------
.deploy-tpl:
  stage: deploy
  environment:
    name: "staging/$SVC"
  script:
    - echo "部署 $SVC 到 staging（骨架）"
    - echo "示例 scp backend/$SVC/target/*-exec.jar deploy@host:/opt/$SVC/ 然后 systemctl restart $SVC"
  rules:
    - if: '$CI_COMMIT_REF_NAME == "master"'
      when: manual

deploy:api-gateway:
  extends: .deploy-tpl
  variables: { SVC: api-gateway }
  needs: ["verify:api-gateway"]

deploy:core-service:
  extends: .deploy-tpl
  variables: { SVC: core-service }
  needs: ["verify:core-service"]

deploy:ai-service:
  extends: .deploy-tpl
  variables: { SVC: ai-service }
  needs: ["verify:ai-service"]

deploy:community-service:
  extends: .deploy-tpl
  variables: { SVC: community-service }
  needs: ["verify:community-service"]

deploy:middleware-service:
  extends: .deploy-tpl
  variables: { SVC: middleware-service }
  needs: ["verify:middleware-service"]

deploy:database-service:
  extends: .deploy-tpl
  variables: { SVC: database-service }
  needs: ["verify:database-service"]

deploy:host-service:
  extends: .deploy-tpl
  variables: { SVC: host-service }
  needs: ["verify:host-service"]

deploy:network-service:
  extends: .deploy-tpl
  variables: { SVC: network-service }
  needs: ["verify:network-service"]

deploy:security-service:
  extends: .deploy-tpl
  variables: { SVC: security-service }
  needs: ["verify:security-service"]
