        - backend/ai-service/**/*
        - backend/knowledge/**/*
        - backend/wiki/**/*
        - backend/ops-agent/**/*
        - backend/pom.xml
        - backend/modular-monolith-parent/pom.xml
        - backend/common-core/**/*
        - backend/common-security/**/*
        - backend/common-web/**/*
        - .gitlab-ci.yml

