# ============================================================================
# 集成中心门户 · monorepo 微服务 CI/CD
#
# 设计：每个服务一条独立流水线，按【路径触发】——只有相关目录变更才构建对应服务；
#       改动共享库 common-* 或父 POM 则【扇出】重建所有服务（每个服务的 changes 里都含这几条）。
# 构建期服务之间零依赖：只用 `mvn -pl <服务> -am`（also-make，连带构建 common-* 与其能力模块）。
# 服务间真实联通（网关↔Nacos↔服务、认证越权）属【集成】层，单独一条流水线在预发环境跑。
#
# 需要：一个 docker executor 的 GitLab Runner（把 default.tags 改成你们 runner 的 tag）。
#       内网若无法直连 Docker Hub，把 image 换成你们镜像仓库里的 maven:3.9-eclipse-temurin-17。
# ============================================================================

# 只在【后端代码 / CI 文件】改动时创建流水线（MR / push / tag）。
# 纯文档改动（agent.md、docs、README 等）没有可跑的 job → 不创建流水线，
# 避免 GitLab 把"空流水线"判为 failed（doc-only 合并不再爆红叉）。
workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["backend/**/*", ".gitlab-ci.yml"]
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: ["backend/**/*", ".gitlab-ci.yml"]

default:
  image: maven:3.9-eclipse-temurin-17
  tags: [docker]                       # ← 改成你们 runner 的 tag
  cache:                               # 复用 .m2，加速依赖解析
    key: "mvn-$CI_COMMIT_REF_SLUG"
    paths: [.m2/repository]

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress -Dstyle.color=never"

stages:
  - verify        # 编译 + 单元测试 + 打包（每服务独立）
  - integration   # 端到端 / 认证越权（需 Nacos + 多服务，骨架，手动）
  - deploy        # 部署（每服务独立，骨架，手动）

# 服务构建模板：mvn -pl <SVC> -am，只构建该服务 + 其依赖（common-* 与能力模块）
.svc-verify:
  stage: verify
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS -pl "$SVC" -am clean verify
  artifacts:
    when: always
    paths:
      - backend/$SVC/target/*-exec.jar
    reports:
      junit:
        - backend/**/target/surefire-reports/TEST-*.xml
    expire_in: 1 week

# ----------------------------------------------------------------------------
# 每服务流水线（路径触发）。
# 每个 changes 列表 = 该服务自身 + 其能力模块 + 【扇出段】(共享库/父POM/本文件)。
# 改共享库 → 所有服务的扇出段命中 → 全部重建。
# ----------------------------------------------------------------------------
verify:api-gateway:
  extends: .svc-verify
  variables: { SVC: api-gateway }
  rules:
    - changes:
        - backend/api-gateway/**/*
        - backend/pom.xml
        - backend/modular-monolith-parent/pom.xml
        - backend/common-core/**/*
        - backend/common-security/**/*
        - backend/common-web/**/*
        - .gitlab-ci.yml

verify:core-service:
  extends: .svc-verify
  variables: { SVC: core-service }
  rules:
    - changes:
        - backend/core-service/**/*
        - backend/identity/**/*
        - backend/catalog/**/*
        - backend/standards/**/*
        - backend/pom.xml
        - backend/modular-monolith-parent/pom.xml
        - backend/common-core/**/*
        - backend/common-security/**/*
        - backend/common-web/**/*
        - .gitlab-ci.yml

