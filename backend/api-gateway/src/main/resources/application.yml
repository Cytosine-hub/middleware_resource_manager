server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: community-api
              uri: "${COMMUNITY_SERVICE_URL:http://127.0.0.1:8082}"
              predicates:
                - Path=/api/forum/**
            - id: ai-api
              uri: "${AI_SERVICE_URL:http://127.0.0.1:8083}"
              predicates:
                - Path=/api/knowledge/**,/api/agent/**,/api/wiki/**,/api/ops-agent/**,/api/ops-agent/export/**
            - id: core-api
              uri: "${CORE_SERVICE_URL:http://127.0.0.1:8084}"
              predicates:
                - Path=/api/auth/**,/api/admin/users/**,/api/admin/account/**,/api/admin/settings/**,/api/admin/releases/**,/api/admin/software-types/**,/api/admin/software-type-categories/**,/api/admin/parameter-standards/**,/api/admin/standard-documents/**,/api/admin/standard-parameters/**,/api/admin/reviews/**,/api/admin/revisions/**,/api/admin/images/**,/api/public/**,/files/**
            - id: middleware-api
              uri: "${MIDDLEWARE_SERVICE_URL:http://127.0.0.1:8085}"
              predicates:
                - Path=/api/middleware-commands/**

app:
  security:
    gateway-signing-secret: ${GATEWAY_SIGNING_SECRET:}
    introspection-base-url: "${CORE_SERVICE_URL:http://127.0.0.1:8084}"
    introspection-load-balanced: false
    introspection-cache-ttl: ${GATEWAY_AUTH_CACHE_TTL:PT15S}
    introspection-cache-max-size: ${GATEWAY_AUTH_CACHE_MAX_SIZE:10000}

logging:
  level:
    root: INFO
    com.middleware.gateway: INFO
