server:
  port: 8081
  tomcat:
    max-http-form-post-size: 2048MB
    # 提高 multipart 文件数量限制（默认很低）
    # 需要通过自定义配置类设置，见 MultipartConfig

logging:
  level:
    root: INFO
    com.middleware.manager: INFO
  file:
    name: logs/middleware-resource-manager.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

spring:
  application:
    name: middleware-resource-manager-app
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://${APP_DB_HOST:127.0.0.1}:${APP_DB_PORT:3306}/${APP_DB_NAME:middleware_resource_manager}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${APP_DB_USERNAME:root}
    password: ${APP_DB_PASSWORD:}
    hikari:
      initialization-fail-timeout: -1
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB



app:
  storage:
    location: ./storage
  security:
    admin:
      default-password: admin123

# MyBatis 配置
mybatis:
  mapper-locations:
    - classpath*:mapper/AdminAccountMapper.xml
    - classpath*:mapper/ReleaseAssetMapper.xml
    - classpath*:mapper/SoftwareTypeMapper.xml
    - classpath*:mapper/StandardDocumentMapper.xml
    - classpath*:mapper/RoleMapper.xml
    - classpath*:mapper/UserTokenMapper.xml
    - classpath*:mapper/SystemSettingMapper.xml
    - classpath*:mapper/SoftwareCategoryMapper.xml
    - classpath*:mapper/DocumentRevisionMapper.xml
    - classpath*:mapper/ParameterStandardMapper.xml
    - classpath*:mapper/ReviewRecordMapper.xml
    - classpath*:mapper/StandardParameterMapper.xml
    - classpath*:mapper/MiddlewareCommandMapper.xml
  type-aliases-package: com.middleware.manager.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# PageHelper 分页插件
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
