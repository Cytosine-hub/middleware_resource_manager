# 本地开发配置
# 前置条件：ollama serve 运行在 11434 端口，已下载 bge-large 模型
# 启动方式: mvn spring-boot:run -Dspring-boot.run.profiles=local
# 需要设置环境变量: AI_API_KEY, APP_DB_PASSWORD

langchain4j:
  open-ai:
    chat-model:
      base-url: ${AI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
      api-key: ${AI_API_KEY}
      model-name: ${AI_MODEL:mimo-v2.5-pro}
      max-tokens: ${AI_MAX_TOKENS:8192}
      temperature: ${AI_TEMPERATURE:0.1}
      timeout: ${AI_TIMEOUT:PT600S}
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: http://localhost:11434/v1
      api-key: ollama
      model-name: bge-large

app:
  ai:
    base-url: ${AI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
    api-key: ${AI_API_KEY}
    model: ${AI_MODEL:mimo-v2.5-pro}
    max-tokens: ${AI_MAX_TOKENS:8192}
    temperature: ${AI_TEMPERATURE:0.1}
  embedding:
    max-chars: 300
  vector:
    type: milvus
    host: localhost
    port: 19530
    collection: knowledge_chunks
