# 生产配置
# 启动方式: java -jar ai-service.jar --spring.profiles.active=prod

langchain4j:
  open-ai:
    chat-model:
      base-url: https://open.bigmodel.cn/api/paas/v4
      api-key: ${GLM_API_KEY}
      model-name: glm-4-plus
      max-tokens: ${AI_MAX_TOKENS:8192}
      temperature: ${AI_TEMPERATURE:0.1}
      timeout: ${AI_TIMEOUT:PT600S}
      log-requests: false
      log-responses: false
    embedding-model:
      base-url: https://open.bigmodel.cn/api/paas/v4
      api-key: ${GLM_API_KEY}
      model-name: embedding-3

app:
  ai:
    base-url: https://open.bigmodel.cn/api/paas/v4
    api-key: ${GLM_API_KEY}
    model: glm-4-plus
    max-tokens: ${AI_MAX_TOKENS:8192}
    temperature: ${AI_TEMPERATURE:0.1}
  embedding:
    max-chars: 4000
  vector:
    type: milvus
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection: knowledge_chunks
